<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Body -->
  <ellipse cx="50" cy="65" rx="28" ry="30" fill="#2c2c2c"/>
  <!-- White belly -->
  <ellipse cx="50" cy="70" rx="18" ry="22" fill="#f5f5f0"/>
  <!-- Head -->
  <ellipse cx="50" cy="30" rx="22" ry="22" fill="#2c2c2c"/>
  <!-- Eyes -->
  <ellipse cx="43" cy="26" rx="5" ry="6" fill="white"/>
  <ellipse cx="57" cy="26" rx="5" ry="6" fill="white"/>
  <circle cx="44" cy="27" r="3" fill="#ff6600"/>
  <circle cx="58" cy="27" r="3" fill="#ff6600"/>
  <!-- Beak -->
  <ellipse cx="50" cy="37" rx="6" ry="4" fill="#ff9900"/>
  <!-- Ears/tufts -->
  <ellipse cx="36" cy="13" rx="5" ry="7" fill="#2c2c2c" transform="rotate(-15 36 13)"/>
  <ellipse cx="64" cy="13" rx="5" ry="7" fill="#2c2c2c" transform="rotate(15 64 13)"/>
  <!-- Feet -->
  <ellipse cx="38" cy="93" rx="10" ry="5" fill="#ff9900" transform="rotate(-15 38 93)"/>
  <ellipse cx="62" cy="93" rx="10" ry="5" fill="#ff9900" transform="rotate(15 62 93)"/>
  <!-- Wings -->
  <ellipse cx="22" cy="65" rx="8" ry="18" fill="#2c2c2c" transform="rotate(-10 22 65)"/>
  <ellipse cx="78" cy="65" rx="8" ry="18" fill="#2c2c2c" transform="rotate(10 78 65)"/>
</svg>
