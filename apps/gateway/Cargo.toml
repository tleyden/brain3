[package]
name = "brain3"
version = "0.1.7"
edition = "2021"

[[bin]]
name = "brain3"
path = "src/main.rs"

[dependencies]
brain3-core = { path = "../../crates/core" }
brain3-platform = { path = "../../crates/platform" }
anyhow = "1"
axum = "0.8"
clap = { version = "4", features = ["derive"] }
crossterm = "0.28"
ratatui = "0.29"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
