name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker for Linux ARM
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: tar -czf brain3-gateway-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release brain3-gateway

      - uses: actions/upload-artifact@v4
        with:
          name: brain3-gateway-${{ matrix.target }}
          path: brain3-gateway-${{ matrix.target }}.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true

  publish-s3:
    name: Publish to S3
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Upload tarballs to S3
        env:
          BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          VERSION: ${{ github.ref_name }}
        run: |
          for tarball in artifacts/*.tar.gz; do
            filename="$(basename "$tarball")"
            aws s3 cp "$tarball" "s3://$BUCKET/releases/$VERSION/$filename"
            aws s3 cp "$tarball" "s3://$BUCKET/releases/latest/$filename"
          done

      - name: Upload install script to S3
        env:
          BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          VERSION: ${{ github.ref_name }}
        run: |
          aws s3 cp scripts/install.sh "s3://$BUCKET/releases/$VERSION/install.sh"
          aws s3 cp scripts/install.sh "s3://$BUCKET/releases/latest/install.sh"
