name: Release

on:
  push:
    tags:
      - "v*"

permissions: read-all

jobs:
  build:
    name: Build ${{ matrix.display }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            display: Linux x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            display: Linux ARM64
          - target: x86_64-apple-darwin
            os: macos-latest
            display: macOS x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            display: macOS ARM64

    steps:
      - uses: actions/checkout@v4

      - name: Validate release tag matches apps/gateway version
        run: |
          APP_VERSION=$(awk -F '"' '/^version = / {print $2; exit}' apps/gateway/Cargo.toml)
          if [ -z "${APP_VERSION}" ]; then
            echo "Could not determine version from apps/gateway/Cargo.toml" >&2
            exit 1
          fi
          if [ "v${APP_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match apps/gateway version v${APP_VERSION}" >&2
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker for Linux ARM
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: tar -czf brain3-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release brain3

      - uses: actions/upload-artifact@v4
        with:
          name: brain3-${{ matrix.target }}
          path: brain3-${{ matrix.target }}.tar.gz

  release:
    name: Create GitHub Release
    needs: prepare-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          name: release-assets

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  prepare-assets:
    name: Prepare Release Assets
    needs: build
    runs-on: ubuntu-latest
    permissions: read-all
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate signed release manifest
        env:
          BRAIN3_RELEASE_SIGNING_KEY_PEM_B64: ${{ secrets.BRAIN3_RELEASE_SIGNING_KEY_PEM_B64 }}
        run: |
          if [ -z "${BRAIN3_RELEASE_SIGNING_KEY_PEM_B64}" ]; then
            echo "Missing required secret: BRAIN3_RELEASE_SIGNING_KEY_PEM_B64" >&2
            exit 1
          fi
          printf '%s' "${BRAIN3_RELEASE_SIGNING_KEY_PEM_B64}" | base64 --decode > release-signing-key.pem
          chmod 600 release-signing-key.pem
          RELEASE_SIGNING_KEY_FILE="$PWD/release-signing-key.pem" \
            bash scripts/generate-release-manifest.sh artifacts
          rm -f release-signing-key.pem

      - name: Verify signed release manifest
        run: |
          test -s artifacts/SHA256SUMS
          test -s artifacts/SHA256SUMS.sig
          openssl dgst -sha256 \
            -verify scripts/release-signing-public-key.pem \
            -signature artifacts/SHA256SUMS.sig \
            artifacts/SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: artifacts/*

  publish-s3:
    name: Publish to S3
    needs: prepare-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          name: release-assets

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Upload to S3
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
        run: |
          bash scripts/upload-to-s3.sh \
            "${{ secrets.BRAIN3_S3_BUCKET }}" \
            "${{ github.ref_name }}" \
            artifacts
