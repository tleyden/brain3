name: PR Build

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.display }}
    if: github.event.action != 'closed'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            display: Linux x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            display: Linux ARM64
          - target: x86_64-apple-darwin
            os: macos-latest
            display: macOS x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            display: macOS ARM64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: pr-${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker for Linux ARM
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: tar -czf brain3-gateway-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release brain3-gateway

      - uses: actions/upload-artifact@v4
        with:
          name: brain3-gateway-${{ matrix.target }}
          path: brain3-gateway-${{ matrix.target }}.tar.gz

  publish-s3:
    name: Publish PR build to S3
    needs: build
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Upload to S3
        env:
          BUCKET: ${{ secrets.BRAIN3_S3_BUCKET }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          for tarball in artifacts/*.tar.gz; do
            filename="$(basename "$tarball")"
            aws s3 cp "$tarball" "s3://$BUCKET/pr/$PR/$filename"
          done

  cleanup-s3:
    name: Remove PR build from S3
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Delete PR artifacts from S3
        env:
          BUCKET: ${{ secrets.BRAIN3_S3_BUCKET }}
          PR: ${{ github.event.pull_request.number }}
        run: aws s3 rm "s3://$BUCKET/pr/$PR/" --recursive
