name: Build and Publish MCP Container

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/brain3-mcp-vault-tools
          tags: |
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Smoke test container startup
        run: |
          set -euo pipefail
          docker build -t brain3-mcp-vault-tools:ci-smoke ./brain3-mcp-vault-tools
          VAULT_DIR="$(mktemp -d)"
          SECRET_DIR="$(mktemp -d)"
          printf 'test-shared-secret\n' > "${SECRET_DIR}/upstream_secret"

          cleanup() {
            docker rm -f brain3-mcp-vault-tools-smoke >/dev/null 2>&1 || true
            rm -rf "${VAULT_DIR}" "${SECRET_DIR}"
          }
          trap cleanup EXIT

          docker run -d \
            --name brain3-mcp-vault-tools-smoke \
            --publish 127.0.0.1:8420:8420 \
            --env B3_VAULT_MCP_HOST=0.0.0.0 \
            --env B3_VAULT_MCP_PORT=8420 \
            --env B3_VAULT_PATH=/vault \
            --env B3_UPSTREAM_SHARED_SECRET_FILE=/run/brain3/upstream_secret \
            --mount "type=bind,source=${VAULT_DIR},target=/vault" \
            --mount "type=bind,source=${SECRET_DIR},target=/run/brain3,readonly" \
            brain3-mcp-vault-tools:ci-smoke

          sleep 5

          if [ "$(docker inspect --format '{{.State.Running}}' brain3-mcp-vault-tools-smoke)" != "true" ]; then
            docker logs brain3-mcp-vault-tools-smoke
            exit 1
          fi

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ./brain3-mcp-vault-tools
          file: ./brain3-mcp-vault-tools/Containerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
