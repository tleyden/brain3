name: E2E

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - main
    types:
      - labeled
      - synchronize

permissions: read-all

jobs:
  e2e-docker-linux:
    name: E2E smoke - Docker / Linux
    if: github.event_name == 'push' || github.event.label.name == 'run-e2e-test' || contains(github.event.pull_request.labels.*.name, 'run-e2e-test')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build brain3 binary
        run: cargo build -p brain3

      - name: Run E2E smoke tests
        run: uv run scripts/e2e_smoke.py
        timeout-minutes: 15

      - name: Dump MCP container diagnostics
        if: always()
        run: |
          docker logs brain3-mcp-vault-tools || true
          docker inspect --format 'name={{.Name}} image={{.Config.Image}} state={{json .State}} driver={{.Driver}} mounts={{json .Mounts}} network_mode={{.HostConfig.NetworkMode}} ports={{json .NetworkSettings.Ports}}' brain3-mcp-vault-tools || true
          docker info | grep -i 'storage driver' || true
